<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Eclavine | Women's Fashion</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}
body{background:#faf7f8;color:#333}
header{position:sticky;top:0;background:#fff;padding:15px 6%;display:flex;justify-content:space-between;align-items:center;box-shadow:0 2px 10px rgba(0,0,0,.08);z-index:10}
.logo{font-size:28px;font-weight:bold;color:#c2185b}
nav a{margin:0 12px;text-decoration:none;color:#333}
.cart-btn{background:#c2185b;color:#fff;border:none;padding:10px 16px;border-radius:20px;cursor:pointer}
.hero{height:70vh;background:url('https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=1400&q=80') center/cover;display:flex;align-items:center;justify-content:center}
.hero div{background:rgba(255,255,255,.75);padding:30px;border-radius:12px;text-align:center}
.hero h1{font-size:48px;color:#c2185b}
.products{padding:50px 6%;display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:25px}
.card{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 5px 15px rgba(0,0,0,.1)}
.card img{width:100%;height:300px;object-fit:cover}
.card .info{padding:15px}
.price{color:#c2185b;font-weight:bold;margin:8px 0}
.card button{width:100%;padding:10px;background:#c2185b;color:#fff;border:none;cursor:pointer}
#cart{position:fixed;right:-360px;top:0;width:360px;height:100%;background:#fff;box-shadow:-5px 0 15px rgba(0,0,0,.2);transition:.3s;padding:20px;overflow:auto;z-index:99}
#cart.open{right:0}
.cart-item{display:flex;justify-content:space-between;align-items:center;margin:12px 0;border-bottom:1px solid #eee;padding-bottom:8px}
footer{text-align:center;padding:25px;background:#222;color:#fff;margin-top:40px}
.small{font-size:13px;color:#666}
</style>
</head>
<body>

<header>
<div class="logo">Eclavine</div>
<nav>
<a href="#">Home</a>
<a href="#">Shop</a>
<a href="#">Collection</a>
<a href="#">Contact</a>
</nav>
<button class="cart-btn" onclick="toggleCart()">🛒 Cart (<span id="count">0</span>)</button>
</header>

<section class="hero">
<div>
<h1>Elegant Women's Fashion</h1>
<p>Luxury styles curated for every occasion.</p>
</div>
</section>

<section class="products" id="products"></section>

<div id="cart">
<h2>Your Cart</h2>
<div id="cartItems"></div>
<h3>Total: $<span id="total">0</span></h3>
<button class="cart-btn" onclick="toggleCart()">Close</button>
</div>

<footer>© 2026 Eclavine Fashion Boutique</footer>

<script>
const products=[
{name:"Floral Dress",price:69,img:"https://images.unsplash.com/photo-1496747611176-843222e1e57c?auto=format&fit=crop&w=800&q=80"},
{name:"Summer Outfit",price:79,img:"https://images.unsplash.com/photo-1512436991641-6745cdb1723f?auto=format&fit=crop&w=800&q=80"},
{name:"Classic Blazer",price:95,img:"https://images.unsplash.com/photo-1483985988355-763728e1935b?auto=format&fit=crop&w=800&q=80"},
{name:"Luxury Handbag",price:120,img:"https://images.unsplash.com/photo-1584917865442-de89df76afd3?auto=format&fit=crop&w=800&q=80"},
{name:"Elegant Heels",price:88,img:"https://images.unsplash.com/photo-1543163521-1bf539c55dd2?auto=format&fit=crop&w=800&q=80"},
{name:"Fashion Coat",price:140,img:"https://images.unsplash.com/photo-1529139574466-a303027c1d8b?auto=format&fit=crop&w=800&q=80"}
];
const cart=[];
const wrap=document.getElementById("products");
products.forEach((p,i)=>{
wrap.innerHTML+=`<div class='card'>
<img src='${p.img}' alt='${p.name}'>
<div class='info'>
<h3>${p.name}</h3>
<div class='price'>$${p.price}</div>
<button onclick='add(${i})'>Add to Cart</button>
</div></div>`;
});
function add(i){
const item=cart.find(x=>x.name===products[i].name);
if(item)item.qty++;
else cart.push({...products[i],qty:1});
render();
}
function render(){
let total=0,count=0;
const c=document.getElementById("cartItems");
c.innerHTML="";
cart.forEach((p,i)=>{
total+=p.price*p.qty;
count+=p.qty;
c.innerHTML+=`<div class='cart-item'>
<div><b>${p.name}</b><div class='small'>$${p.price} × ${p.qty}</div></div>
<div>
<button onclick='change(${i},-1)'>-</button>
<button onclick='change(${i},1)'>+</button>
</div>
</div>`;
});
document.getElementById("total").textContent=total.toFixed(2);
document.getElementById("count").textContent=count;
}
function change(i,d){
cart[i].qty+=d;
if(cart[i].qty<=0)cart.splice(i,1);
render();
}
function toggleCart(){document.getElementById("cart").classList.toggle("open");}
</script>

</body>
</html>
